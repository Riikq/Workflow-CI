name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model & Generate Artifacts
        run: |
          python modelling.py

      - name: Save Model Artifacts to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: pilgrimage-rf-model-artifact
          path: final_model/
          retention-days: 30

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image via MLflow
        run: |
          mlflow models build-docker -m final_model/ -n ${{ secrets.DOCKER_USERNAME }}/pilgrimage-model:latest

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pilgrimage_model:latest
